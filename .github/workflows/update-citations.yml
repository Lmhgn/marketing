name: Update LLM Citation Data

on:
  # Run every Monday at 08:00 UTC
  schedule:
    - cron: "0 8 * * 1"

  # Allow manual runs from the Actions tab with optional overrides
  workflow_dispatch:
    inputs:
      provider:
        description: "LLM provider"
        required: false
        default: "anthropic"
        type: choice
        options:
          - anthropic
          - openai
      model:
        description: "Model name (blank = provider default: claude-opus-4-5 / gpt-4o)"
        required: false
        default: ""
      venue:
        description: "Run for a single venue slug only (blank = all 20 venues)"
        required: false
        default: ""
      debug:
        description: "Save raw LLM responses to citation_debug.json"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: update-citations
  cancel-in-progress: true

jobs:
  run-citation-runner:
    name: Run citation runner and commit results
    runs-on: ubuntu-slim
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: seo-aeo-dashboard/requirements.txt

      - name: Install dependencies
        run: pip install -r seo-aeo-dashboard/requirements.txt

      - name: Run citation runner
        id: runner
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd seo-aeo-dashboard

          PROVIDER="${{ inputs.provider || 'anthropic' }}"
          ARGS="--provider $PROVIDER"

          if [ -n "${{ inputs.model }}" ]; then
            ARGS="$ARGS --model ${{ inputs.model }}"
          fi
          if [ -n "${{ inputs.venue }}" ]; then
            ARGS="$ARGS --venue ${{ inputs.venue }}"
          fi
          if [ "${{ inputs.debug }}" = "true" ]; then
            ARGS="$ARGS --debug --verbose"
          fi

          echo "Running: python citation_runner.py $ARGS"
          python citation_runner.py $ARGS

          echo "provider=$PROVIDER" >> $GITHUB_OUTPUT

      - name: Commit updated citation data
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_user_name: Coreybot
          commit_user_email: coreybot+github-actions[bot]@users.noreply.github.com
          commit_message: "data: refresh LLM citation results (${{ steps.runner.outputs.provider }}, run ${{ github.run_id }})"
          file_pattern: seo-aeo-dashboard/data/citation_results.json seo-aeo-dashboard/data/citation_debug.json
          skip_dirty_check: false
